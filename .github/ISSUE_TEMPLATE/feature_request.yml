name: Feature Request
description: Suggest a new capability.
labels: ["needs triage"]
type: feature

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

        Use this form for specific feature requests. If the idea is broad or exploratory, opening a discussion with maintainers first may be a better fit.

        Please do not include private information, security vulnerability details, sensitive material, archived game dumps, original proprietary assets, or decompiled source code.

        NOTE: Any changes to the frontend itself are likely out of scope for mygamebuilder-local, which only aims to host the original flash client and data. Please submit feature requests on the [opengamebuilder](https://github.com/OpenGameBuilder/opengamebuilder/issues) repository instead.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing requests to avoid creating a duplicate.
          required: true
        - label: This request does not include private, sensitive, security-related, proprietary, or decompiled-source material.
          required: true
        - label: This does not propose changes to the frontend Flash implementation, which is out of scope for mygamebuilder-local.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: What would you like to see?
      description: Briefly describe the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Why would this be useful?
      description: What problem does this solve, or what would it make better?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Best guess is fine.
      multiple: true
      options:
        - Local backend API
        - Legacy client hosting
        - Archive/data tooling
        - Developer experience
        - CI/CD
        - Documentation
        - Not sure
        - Other
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Examples, sketches, or related ideas
      description: Add examples, mockups, screenshots, links, or rough notes if useful.
    validations:
      required: false

