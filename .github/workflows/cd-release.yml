name: CD / Release

# Dispatch this workflow from main so the latest workflow file is used.
# For a standard release, leave `ref` as main. For a patch release, set `ref`
# to `patch/vX.Y.Z`. The workflow checks out `ref`, validates the version in
# Directory.Build.props, builds and tests, publishes release archives, creates
# the immutable tag and GitHub Release, then opens follow-up housekeeping PRs.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to release. Use `main` for standard releases or `patch/vX.Y.Z` for patch releases. Defaults to `main`."
        required: false
        type: string
        default: main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cd-release
  cancel-in-progress: false

env:
  HUSKY: 0
  PROJECT: src/MyGameBuilder.Local.Api/MyGameBuilder.Local.Api.csproj
  SOLUTION: mygamebuilder-local.slnx

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    outputs:
      kind: ${{ steps.validate.outputs.kind }}
      version: ${{ steps.validate.outputs.version }}
      tag: ${{ steps.validate.outputs.tag }}
      source_sha: ${{ steps.validate.outputs.source_sha }}
      previous_tag: ${{ steps.validate.outputs.previous_tag }}
      next_main_version: ${{ steps.validate.outputs.next_main_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Validate
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ inputs.ref }}
        run: bash ./scripts/validate-release.sh

  package:
    name: Build, smoke, and package (${{ matrix.rid }})
    needs: validate
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runner: windows-latest
            archive_ext: zip
            executable: mygamebuilder-local.exe
          - rid: linux-x64
            runner: ubuntu-latest
            archive_ext: tar.gz
            executable: mygamebuilder-local
          - rid: osx-x64
            runner: macos-26-intel
            archive_ext: tar.gz
            executable: mygamebuilder-local
          - rid: osx-arm64
            runner: macos-26
            archive_ext: tar.gz
            executable: mygamebuilder-local

    env:
      RID: ${{ matrix.rid }}
      ARCHIVE_EXT: ${{ matrix.archive_ext }}
      EXECUTABLE: ${{ matrix.executable }}
      VERSION: ${{ needs.validate.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ needs.validate.outputs.source_sha }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore tools
        shell: pwsh
        run: dotnet tool restore

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:SOLUTION

      - name: Build
        shell: pwsh
        run: dotnet build $env:SOLUTION --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test $env:SOLUTION --configuration Release --no-build

      - name: Publish
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $output = Join-Path "artifacts/publish" $env:RID
          New-Item -ItemType Directory -Force -Path $output | Out-Null

          dotnet publish $env:PROJECT `
            --configuration Release `
            --runtime $env:RID `
            --self-contained true `
            --output $output `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none `
            -p:DebugSymbols=false

      - name: Add package README
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $output = Join-Path "artifacts/publish" $env:RID
          $readme = @"
          MyGameBuilder Local $env:VERSION ($env:RID)

          Run:
            Windows: .\mygamebuilder-local.exe
            macOS/Linux: ./mygamebuilder-local

          Open http://127.0.0.1:3000 after startup.

          Optional local data:
            archive.sqlite        read-only piece archive next to the executable
            frontend.sqlite       recovered frontend/client archive next to the executable

          GitHub Release archives intentionally do not bundle legacy client,
          frontend, archive, or overlay data. The app creates overlay.sqlite
          next to the executable for local writes and can install prompted
          frontend/data archive updates from the in-app setup page.
          "@
          $readme = $readme -replace "(?m)^          ", ""
          Set-Content -Path (Join-Path $output "README.txt") -Value $readme -Encoding UTF8

      - name: Smoke test published app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $output = Join-Path "artifacts/publish" $env:RID
          $exe = Join-Path $output $env:EXECUTABLE
          if (-not (Test-Path $exe)) {
            throw "Published executable was not found: $exe"
          }

          if ($env:RID -ne "win-x64") {
            chmod +x $exe
          }

          $stdout = Join-Path $env:RUNNER_TEMP "mygamebuilder-local-$env:RID.out.log"
          $stderr = Join-Path $env:RUNNER_TEMP "mygamebuilder-local-$env:RID.err.log"
          $process = $null
          $launchToken = "release-smoke-$env:RID-$([Guid]::NewGuid().ToString('N'))"
          $env:MGB_LAUNCH_TOKEN = $launchToken

          try {
            $process = Start-Process -FilePath $exe -WorkingDirectory $output -PassThru -RedirectStandardOutput $stdout -RedirectStandardError $stderr
            $deadline = (Get-Date).AddSeconds(45)
            $healthy = $false

            while ((Get-Date) -lt $deadline) {
              if ($process.HasExited) {
                throw "Published app exited before the health check completed with code $($process.ExitCode)."
              }

              try {
                $body = (Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:3000/healthz" -TimeoutSec 2).Content
                if ($body.Trim() -eq $launchToken) {
                  $healthy = $true
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }

            if (-not $healthy) {
              throw "Health check did not return the release smoke token before the timeout."
            }

            $overlay = Join-Path $output "overlay.sqlite"
            if (-not (Test-Path $overlay)) {
              throw "Smoke test did not observe overlay.sqlite creation."
            }
          } catch {
            Write-Host "::group::published app stdout"
            if (Test-Path $stdout) { Get-Content $stdout }
            Write-Host "::endgroup::"
            Write-Host "::group::published app stderr"
            if (Test-Path $stderr) { Get-Content $stderr }
            Write-Host "::endgroup::"
            throw
          } finally {
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              $process.WaitForExit(5000) | Out-Null
            }
          }

      - name: Verify release contents
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $output = Join-Path "artifacts/publish" $env:RID
          Get-ChildItem -Path $output -Filter "overlay.sqlite*" -Force | Remove-Item -Force
          foreach ($directory in @("archive", "data", "frontend")) {
            $path = Join-Path $output $directory
            if (Test-Path $path) {
              Remove-Item -Path $path -Recurse -Force
            }
          }

          foreach ($forbidden in @("archive.sqlite", "overlay.sqlite", "archive", "data", "frontend")) {
            $path = Join-Path $output $forbidden
            if (Test-Path $path) {
              throw "Release package must not include $forbidden."
            }
          }

          if (-not (Test-Path (Join-Path $output "README.txt"))) {
            throw "Release package README.txt is missing."
          }

      - name: Create archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $output = Join-Path "artifacts/publish" $env:RID
          $dist = "artifacts/dist"
          $archiveName = "mygamebuilder-local-$env:VERSION-$env:RID.$env:ARCHIVE_EXT"
          $archivePath = Join-Path $dist $archiveName
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          if ($env:ARCHIVE_EXT -eq "zip") {
            Compress-Archive -Path (Join-Path $output "*") -DestinationPath $archivePath -Force
          } else {
            tar -C $output -czf $archivePath .
          }

          if (-not (Test-Path $archivePath)) {
            throw "Expected archive was not created: $archivePath"
          }

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: artifacts/dist/mygamebuilder-local-${{ needs.validate.outputs.version }}-${{ matrix.rid }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Tag and publish release
    needs:
      - validate
      - package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ needs.validate.outputs.source_sha }}
          fetch-depth: 0

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts/dist
          pattern: release-*
          merge-multiple: true

      - name: Verify release archives
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          expected=(
            "mygamebuilder-local-${VERSION}-win-x64.zip"
            "mygamebuilder-local-${VERSION}-linux-x64.tar.gz"
            "mygamebuilder-local-${VERSION}-osx-x64.tar.gz"
            "mygamebuilder-local-${VERSION}-osx-arm64.tar.gz"
          )

          for asset in "${expected[@]}"; do
            test -f "artifacts/dist/${asset}" || {
              echo "Missing release asset: ${asset}" >&2
              exit 1
            }
          done

          find artifacts/dist -maxdepth 1 -type f -print | sort

          assets_json='[]'
          for asset in "${expected[@]}"; do
            rid="${asset#mygamebuilder-local-${VERSION}-}"
            rid="${rid%.zip}"
            rid="${rid%.tar.gz}"
            sha="$(sha256sum "artifacts/dist/${asset}" | awk '{print $1}')"
            size="$(stat -c '%s' "artifacts/dist/${asset}")"
            assets_json="$(jq -c \
              --arg rid "${rid}" \
              --arg name "${asset}" \
              --arg sha256 "${sha}" \
              --argjson sizeBytes "${size}" \
              '. + [{ rid: $rid, name: $name, sha256: $sha256, sizeBytes: $sizeBytes }]' \
              <<< "${assets_json}")"
          done

          jq -n \
            --arg version "${VERSION}" \
            --arg tag "v${VERSION}" \
            --argjson assets "${assets_json}" \
            '{ version: $version, tag: $tag, assets: $assets }' \
            > artifacts/dist/mygamebuilder-local-release.json

          (cd artifacts/dist && sha256sum "${expected[@]}" mygamebuilder-local-release.json | sort -k2 > SHA256SUMS.txt)

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
          SOURCE_SHA: ${{ needs.validate.outputs.source_sha }}
          PREVIOUS_TAG: ${{ needs.validate.outputs.previous_tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            existing_sha="$(git rev-list -n 1 "${TAG}")"
            if [ "${existing_sha}" != "${SOURCE_SHA}" ]; then
              echo "Tag ${TAG} already exists at ${existing_sha}, expected ${SOURCE_SHA}." >&2
              exit 1
            fi
            echo "Tag ${TAG} already exists at the expected SHA."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" "${SOURCE_SHA}" -m "Release ${TAG}"
            git push origin "refs/tags/${TAG}"
          fi

          assets=(artifacts/dist/*)
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG} already exists; uploading assets idempotently."
            gh release upload "${TAG}" "${assets[@]}" --clobber
          else
            args=(release create "${TAG}" "${assets[@]}" --verify-tag --generate-notes --title "${TAG}")
            if [ -n "${PREVIOUS_TAG}" ]; then
              args+=(--notes-start-tag "${PREVIOUS_TAG}")
            fi
            gh "${args[@]}"
          fi

      - name: Open follow-up PR
        env:
          GH_TOKEN: ${{ github.token }}
          KIND: ${{ needs.validate.outputs.kind }}
          VERSION: ${{ needs.validate.outputs.version }}
          TAG: ${{ needs.validate.outputs.tag }}
          NEXT_MAIN_VERSION: ${{ needs.validate.outputs.next_main_version }}
        run: bash ./scripts/post-release.sh
