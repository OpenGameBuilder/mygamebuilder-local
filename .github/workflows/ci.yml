name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "patch/**"
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore mygamebuilder-local.slnx

      - name: Build
        run: dotnet build mygamebuilder-local.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test mygamebuilder-local.slnx --configuration Release --no-build
