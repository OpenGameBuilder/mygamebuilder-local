name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "patch/**"
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  build-test:
    name: Build and test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            runner: ubuntu-latest
          - name: Windows
            runner: windows-latest
          - name: macOS
            runner: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore tools
        shell: pwsh
        run: dotnet tool restore

      - name: Restore
        shell: pwsh
        run: dotnet restore mygamebuilder-local.slnx

      - name: Build
        shell: pwsh
        run: dotnet build mygamebuilder-local.slnx --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test mygamebuilder-local.slnx --configuration Release --no-build
